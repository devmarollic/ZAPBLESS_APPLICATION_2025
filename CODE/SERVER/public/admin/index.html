<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZapBless Admin - Church Management</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 40px;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            color: white;
            max-width: 600px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .status {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
            margin-top: 2rem;
        }
        .api-link {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            transition: background 0.3s;
            margin: 5px;
        }
        .api-link:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ ZapBless Admin</h1>
        <p>Painel Administrativo</p>
        
        <div class="status">
            <h3>🔧 Área Administrativa</h3>
            <p>Acesso restrito para administradores do sistema</p>
            <a href="/api" class="api-link">📋 API</a>
            <a href="/" class="api-link">🏠 Home</a>
        </div>
        
        <div class="status">
            <h3>🚧 Em Desenvolvimento</h3>
            <p>Painel administrativo em construção...</p>
        </div>
    </div>
</body>
</html>
